spring.application.name=journal

# MySQL Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/journal_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate/JPA Configuration
# 'update' automatically updates the schema to match your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.issuer=journal-app
app.jwt.secret-base64=PUT_A_BASE64_32_BYTE_SECRET_HERE
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=7
